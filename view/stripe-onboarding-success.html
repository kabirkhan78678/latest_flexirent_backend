<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stripe Onboarding Success</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f4fff7 0%, #e6f7ff 100%);
      color: #153243;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(21, 50, 67, 0.12);
      padding: 36px 28px;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #dcfce7;
      color: #15803d;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 0;
      line-height: 1.6;
      color: #486581;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Stripe Onboarding Complete</h1>
    <p>Your Stripe account setup was completed successfully. You can return to the app and continue using payouts.</p>
  </div>
</body>
</html>
