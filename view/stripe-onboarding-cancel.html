<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stripe Onboarding Cancelled</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff7ed 0%, #fff1f2 100%);
      color: #3f1d0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(63, 29, 15, 0.12);
      padding: 36px 28px;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #ffedd5;
      color: #c2410c;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 0;
      line-height: 1.6;
      color: #7c5a4f;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">!</div>
    <h1>Stripe Onboarding Cancelled</h1>
    <p>You cancelled the Stripe onboarding flow. You can go back to the app and start onboarding again whenever you are ready.</p>
  </div>
</body>
</html>
